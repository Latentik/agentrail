name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . "pytest-cov>=6.0,<7" pytest ruff build twine

      - name: Validate tag and capture version
        id: version
        run: |
          VERSION=$(python scripts/release_metadata.py verify-tag "${GITHUB_REF_NAME}")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: ruff check src tests scripts

      - name: Test
        run: PYTHONPATH=src pytest -q

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload PyPI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/*

  build_macos:
    needs: validate
    runs-on: macos-14
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build standalone binary
        run: |
          pyinstaller \
            --onedir \
            --name agentrail \
            --paths src \
            src/agentrail/cli.py

      - name: Package binary artifact
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python scripts/build_release_bundle.py \
            --dist-dir dist \
            --output-dir . \
            --version "${VERSION}" \
            --platform macos-arm64

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            agentrail-v${{ needs.validate.outputs.version }}-macos-arm64.tar.gz
            agentrail-v${{ needs.validate.outputs.version }}-macos-arm64.tar.gz.sha256

  build_linux_x86_64:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build standalone binary
        run: |
          pyinstaller \
            --onedir \
            --name agentrail \
            --paths src \
            src/agentrail/cli.py

      - name: Package binary artifact
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python scripts/build_release_bundle.py \
            --dist-dir dist \
            --output-dir . \
            --version "${VERSION}" \
            --platform linux-x86_64

      - name: Upload Linux x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            agentrail-v${{ needs.validate.outputs.version }}-linux-x86_64.tar.gz
            agentrail-v${{ needs.validate.outputs.version }}-linux-x86_64.tar.gz.sha256

  build_linux_arm64:
    needs: validate
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build standalone binary
        run: |
          pyinstaller \
            --onedir \
            --name agentrail \
            --paths src \
            src/agentrail/cli.py

      - name: Package binary artifact
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python scripts/build_release_bundle.py \
            --dist-dir dist \
            --output-dir . \
            --version "${VERSION}" \
            --platform linux-arm64

      - name: Upload Linux arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            agentrail-v${{ needs.validate.outputs.version }}-linux-arm64.tar.gz
            agentrail-v${{ needs.validate.outputs.version }}-linux-arm64.tar.gz.sha256

  build_windows_x64:
    needs: validate
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build standalone binary
        run: |
          pyinstaller `
            --onedir `
            --name agentrail `
            --paths src `
            src/agentrail/cli.py

      - name: Package binary artifact
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python scripts/build_release_bundle.py `
            --dist-dir dist `
            --output-dir . `
            --version "${env:VERSION}" `
            --platform windows-x64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            agentrail-v${{ needs.validate.outputs.version }}-windows-x64.zip
            agentrail-v${{ needs.validate.outputs.version }}-windows-x64.zip.sha256

  github_release:
    needs:
      - validate
      - build_macos
      - build_linux_x86_64
      - build_linux_arm64
      - build_windows_x64
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '*'

      - name: Flatten artifacts for release
        run: |
          mkdir -p release
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release/ \;

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  pypi_publish:
    needs:
      - validate
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentrail
    permissions:
      id-token: write
    steps:
      - name: Download PyPI artifacts
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  update_homebrew_tap:
    needs:
      - validate
      - build_macos
      - build_linux_x86_64
      - build_linux_arm64
      - github_release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      OWNER_REPO: ${{ github.repository }}
      TAG_NAME: ${{ github.ref_name }}
      TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: dist/macos-arm64

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64
          path: dist/linux-x86_64

      - name: Download Linux arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64
          path: dist/linux-arm64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render Homebrew formula
        env:
          FORMULA_PATH: ${{ vars.HOMEBREW_TAP_FORMULA_PATH }}
        run: |
          : "${FORMULA_PATH:=Formula/agentrail.rb}"
          ARM_SHA=$(cut -d ' ' -f 1 "dist/macos-arm64/agentrail-v${VERSION}-macos-arm64.tar.gz.sha256")
          LINUX_X86_SHA=$(cut -d ' ' -f 1 "dist/linux-x86_64/agentrail-v${VERSION}-linux-x86_64.tar.gz.sha256")
          LINUX_ARM_SHA=$(cut -d ' ' -f 1 "dist/linux-arm64/agentrail-v${VERSION}-linux-arm64.tar.gz.sha256")
          python scripts/render_homebrew_formula.py \
            --version "${VERSION}" \
            --owner-repo "${OWNER_REPO}" \
            --arm-url "https://github.com/${OWNER_REPO}/releases/download/${TAG_NAME}/agentrail-v${VERSION}-macos-arm64.tar.gz" \
            --arm-sha "${ARM_SHA}" \
            --linux-x86_64-url "https://github.com/${OWNER_REPO}/releases/download/${TAG_NAME}/agentrail-v${VERSION}-linux-x86_64.tar.gz" \
            --linux-x86_64-sha "${LINUX_X86_SHA}" \
            --linux-arm64-url "https://github.com/${OWNER_REPO}/releases/download/${TAG_NAME}/agentrail-v${VERSION}-linux-arm64.tar.gz" \
            --linux-arm64-sha "${LINUX_ARM_SHA}" \
            --output agentrail.rb
          echo "FORMULA_PATH=${FORMULA_PATH}" >> "$GITHUB_ENV"

      - name: Clone tap repository
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          test -n "${TAP_REPO}"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" tap

      - name: Update formula and push
        run: |
          mkdir -p "tap/$(dirname "${FORMULA_PATH}")"
          cp agentrail.rb "tap/${FORMULA_PATH}"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FORMULA_PATH}"
          git commit -m "Update agentrail ${VERSION}" || exit 0
          git push origin HEAD

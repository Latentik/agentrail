name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff build

      - name: Validate tag and capture version
        id: version
        run: |
          VERSION=$(python scripts/release_metadata.py verify-tag "${GITHUB_REF_NAME}")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: ruff check src tests scripts

      - name: Test
        run: PYTHONPATH=src pytest -q

      - name: Build Python package
        run: python -m build

  build_python:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build_macos:
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x86_64
          - os: macos-14
            arch: arm64

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build standalone binary
        run: |
          pyinstaller \
            --onefile \
            --name agentrail \
            --paths src \
            src/agentrail/cli.py

      - name: Package binary artifact
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p release
          cp dist/agentrail release/agentrail
          tar -C release -czf "agentrail-v${VERSION}-macos-${ARCH}.tar.gz" agentrail
          shasum -a 256 "agentrail-v${VERSION}-macos-${ARCH}.tar.gz" > "agentrail-v${VERSION}-macos-${ARCH}.tar.gz.sha256"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            agentrail-v${{ needs.validate.outputs.version }}-macos-${{ matrix.arch }}.tar.gz
            agentrail-v${{ needs.validate.outputs.version }}-macos-${{ matrix.arch }}.tar.gz.sha256

  github_release:
    needs:
      - validate
      - build_python
      - build_macos
    runs-on: ubuntu-latest
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Download Intel macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-x86_64
          path: dist

      - name: Download ARM macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish_pypi:
    needs:
      - validate
      - build_python
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  update_homebrew_tap:
    needs:
      - validate
      - build_macos
      - github_release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      OWNER_REPO: ${{ github.repository }}
      TAG_NAME: ${{ github.ref_name }}
      TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download Intel macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-x86_64
          path: dist

      - name: Download ARM macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render Homebrew formula
        env:
          FORMULA_PATH: ${{ vars.HOMEBREW_TAP_FORMULA_PATH }}
        run: |
          : "${FORMULA_PATH:=Formula/agentrail.rb}"
          ARM_SHA=$(cut -d ' ' -f 1 "dist/agentrail-v${VERSION}-macos-arm64.tar.gz.sha256")
          INTEL_SHA=$(cut -d ' ' -f 1 "dist/agentrail-v${VERSION}-macos-x86_64.tar.gz.sha256")
          python scripts/render_homebrew_formula.py \
            --version "${VERSION}" \
            --owner-repo "${OWNER_REPO}" \
            --arm-url "https://github.com/${OWNER_REPO}/releases/download/${TAG_NAME}/agentrail-v${VERSION}-macos-arm64.tar.gz" \
            --arm-sha "${ARM_SHA}" \
            --intel-url "https://github.com/${OWNER_REPO}/releases/download/${TAG_NAME}/agentrail-v${VERSION}-macos-x86_64.tar.gz" \
            --intel-sha "${INTEL_SHA}" \
            --output agentrail.rb
          echo "FORMULA_PATH=${FORMULA_PATH}" >> "$GITHUB_ENV"

      - name: Clone tap repository
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          test -n "${TAP_REPO}"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" tap

      - name: Update formula and push
        run: |
          mkdir -p "tap/$(dirname "${FORMULA_PATH}")"
          cp agentrail.rb "tap/${FORMULA_PATH}"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FORMULA_PATH}"
          git commit -m "Update agentrail ${VERSION}" || exit 0
          git push origin HEAD

name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-cov ruff build mypy

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy src/agentrail --ignore-missing-imports

      - name: Test with coverage
        run: PYTHONPATH=src pytest -q --cov=agentrail --cov-fail-under=80

      - name: Build package
        run: python -m build
